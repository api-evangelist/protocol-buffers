name: Protocol Buffers
description: Protocol Buffers (Protobuf) is Google's language-neutral, platform-neutral,
  extensible mechanism for serializing structured data. It defines a schema language
  for specifying message structures in .proto files, which are compiled into efficient
  binary wire format code for multiple programming languages. Widely used with gRPC
  for high-performance remote procedure calls and data interchange.
url: https://protobuf.dev/
